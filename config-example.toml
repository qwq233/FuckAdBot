[bot]
# Telegram Bot Token (required)
token = ""
# Super admin Telegram user IDs
admins = []
dispatcher_max_routines = 16
admin_cache_ttl = "30s"
admin_negative_cache_ttl = "10s"
pending_sweeper_interval = "1s"

[turnstile]
enabled = true
# Cloudflare Turnstile site key
site_key = ""
# Cloudflare Turnstile secret key
secret_key = ""
# Dedicated public hostname for verification pages. The program always uses
# https://<domain>/verify and https://<domain>/verify/callback.
domain = "verify.example.com"
# HTTP server listen address (no TLS, use nginx reverse proxy)
listen_addr = "127.0.0.1"
# HTTP server port (customizable)
listen_port = 8080
# How long the verification link remains valid
verify_timeout = "10m"

[blacklist]
# Initial blacklist words (loaded on startup)
words = []

[moderation]
# Max unverified attempts before auto-ban
max_warnings = 3
# Seconds before reminder message is auto-deleted. Effective value will never
# be shorter than verify_window, so the user can still see the button while the
# current verification window is active.
reminder_ttl = 30
# How long to keep the unverified user's original message visible after sending
# the verification reply. If still unverified when this expires, that original
# message is deleted. Effective value will never exceed verify_window.
original_message_ttl = "1m"
# Duration of each verification window after a reminder
verify_window = "5m"

[store]
# Storage backend: "sqlite" or "redis"
type = "sqlite"
# Data directory. The SQLite primary database is always created as
# <data_path>/fuckad.db. When dual write is enabled, the retry queue is always
# created as <data_path>/redis-sync-queue.db.
data_path = "./data"
# Redis settings
redis_addr = ""
redis_password = ""
redis_db = 0
redis_key_prefix = "fuckad:"
# Enable SQLite primary + Redis cache dual-write mode. This option is valid
# only when type = "sqlite".
dual_write_enabled = false
# Dual-write tuning is fixed in code to keep production behavior predictable.
