name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: go test ./...
      - name: Coverage profiles
        run: |
          mkdir -p .gocache
          go test -count=1 -coverpkg=./cmd/bot -coverprofile=.gocache/cover-cmd-bot.out ./cmd/bot
          go test -count=1 -coverpkg=./internal/store -coverprofile=.gocache/cover-store.out ./internal/store
          go test -count=1 -coverpkg=./internal/bot -coverprofile=.gocache/cover-bot.out ./internal/bot
          go test -count=1 -coverpkg=./internal/config -coverprofile=.gocache/cover-config.out ./internal/config
          go test -count=1 -coverpkg=./internal/captcha -coverprofile=.gocache/cover-captcha.out ./internal/captcha
          go test -count=1 -coverpkg=./internal/blacklist -coverprofile=.gocache/cover-blacklist.out ./internal/blacklist
      - name: Coverage gate
        run: go run ./cmd/coveragegate .gocache/cover-cmd-bot.out .gocache/cover-store.out .gocache/cover-bot.out .gocache/cover-config.out .gocache/cover-captcha.out .gocache/cover-blacklist.out
      - name: Smoke loadtest
        run: go run ./cmd/loadtest -profile smoke -store sqlite
