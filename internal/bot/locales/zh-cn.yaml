start_help: |-
  如果您需要完成人机验证，请点击群组中发送给您的验证链接。

  /lang - 修改偏好语言

  <b>管理员命令:</b>
  /addblocklist &lt;词汇&gt; - 添加黑名单
  /delblocklist &lt;词汇&gt; - 移除黑名单
  /listblocklist - 查看黑名单
  /approve &lt;uid&gt; - 批准验证
  /reject &lt;uid&gt; - 拒绝验证
  /unreject &lt;uid&gt; - 撤销拒绝
  /resetverify &lt;uid&gt; - 清空用户所有聊天室验证状态(仅超级管理员)
  /stats - 查看统计
