start_help: |-
  If you need to complete the human verification, open the verification link sent to you in the group.

  /lang - Change your preferred language

  <b>Admin commands:</b>
  /addblocklist &lt;word&gt; - Add a blacklist word
  /delblocklist &lt;word&gt; - Remove a blacklist word
  /listblocklist - Show blacklist words
  /approve &lt;uid&gt; - Approve verification
  /reject &lt;uid&gt; - Reject verification
  /unreject &lt;uid&gt; - Undo a rejection
  /resetverify &lt;uid&gt; - Clear verification state in all chats (super admin only)
  /stats - Show statistics
